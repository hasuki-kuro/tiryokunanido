<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☆12 ノーマル難易度表</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#08080e;
  --s1:#0e0e1c;
  --s2:#121224;
  --bdr:#20203a;
  --txt:#d2d2ea;
  --dim:#8890b0;
  --hh:50px;
  --mw:264px;
  --mono:'Courier New',Consolas,monospace;
}

body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;
  font-size:13px;
  line-height:1.4;
  min-height:100vh;
}

/* ── HEADER ── */
#hd{
  position:fixed;top:0;left:0;right:0;
  height:var(--hh);
  background:#0a0a16;
  border-bottom:1px solid #222242;
  display:flex;align-items:center;
  padding:0 14px;
  z-index:200;
}
#hd h1{
  flex:1;
  font-size:15px;font-weight:700;
  color:#7aaaff;
  letter-spacing:.06em;
}
#hd h1 .star{color:#ffd700;margin-right:2px}

/* ── HAMBURGER ── */
#hbg{
  width:36px;height:36px;
  background:none;
  border:1px solid #282850;
  border-radius:3px;
  cursor:pointer;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:5px;padding:7px;
  flex-shrink:0;
  transition:border-color .2s;
}
#hbg:hover{border-color:#4040a0}
#hbg span{
  display:block;width:18px;height:2px;
  background:#7aaaff;border-radius:1px;
  transition:transform .22s,opacity .22s;
}
#hbg.is-open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
#hbg.is-open span:nth-child(2){opacity:0}
#hbg.is-open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ── OVERLAY ── */
#ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:300;
}
#ov.on{display:block}

/* ── SIDE MENU ── */
#mn{
  position:fixed;top:0;right:calc(-1 * var(--mw));
  width:var(--mw);height:100vh;
  background:#0c0c1c;
  border-left:1px solid #222242;
  z-index:400;
  transition:right .26s ease;
  display:flex;flex-direction:column;
}
#mn.open{right:0}

#mn-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  border-bottom:1px solid #1a1a32;
  flex-shrink:0;
}
#mn-top span{
  font-size:11px;color:var(--dim);
  letter-spacing:.08em;
}
#mc{
  background:none;border:none;
  color:#7aaaff;font-size:18px;
  cursor:pointer;line-height:1;
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
}
#mn-list{overflow-y:auto;flex:1;padding-bottom:24px}

.mn-a{
  display:flex;align-items:center;gap:8px;
  padding:9px 16px;
  color:var(--dim);
  text-decoration:none;
  border-bottom:1px solid #14142a;
  font-size:12px;
  transition:background .14s,color .14s;
}
.mn-a:hover{background:#141430;color:var(--txt)}
.mn-grade{font-weight:700;min-width:68px}
.mn-n{font-size:11px;color:var(--dim)}

/* ── MAIN ── */
#main{padding-top:calc(var(--hh) + 10px);padding-bottom:60px}

/* ── TIER SECTION ── */
.ts{margin-bottom:24px}

.th{
  position:sticky;top:var(--hh);
  background:#0d0d1c;
  border-left:4px solid var(--tc,#666);
  padding:6px 14px;
  display:flex;align-items:center;gap:10px;
  z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.th h2{
  font-size:13px;font-weight:700;
  color:var(--tc,#888);
  letter-spacing:.04em;
}
.th-n{font-size:11px;color:var(--dim)}

/* ── TABLE ── */
.tbl{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
.tbl colgroup .cv{width:34px}
.tbl colgroup .cn{width:auto}
.tbl colgroup .cb{width:118px}
.tbl colgroup .co{width:52px}
.tbl colgroup .ca{width:200px}
.tbl colgroup .ct{width:78px}

.tbl thead th{
  background:var(--s1);
  color:var(--dim);
  font-weight:400;
  font-size:11px;
  padding:5px 6px;
  border-bottom:1px solid var(--bdr);
  white-space:nowrap;
  overflow:hidden;
}
.tbl thead th.cv{text-align:center}
.tbl thead th.co{text-align:right}
.tbl thead th.cb,.tbl thead th.ca,.tbl thead th.ct{text-align:left}

.tbl tbody tr{border-bottom:1px solid #101020}
.tbl tbody tr:not([class]):nth-child(even){background:rgba(255,255,255,.012)}
.tbl tbody tr:not([class*="st-"]):hover{background:#141432}
.tbl tbody tr[class*="st-"]:hover{filter:brightness(1.15)}
.tbl td{
  padding:5px 6px;
  vertical-align:middle;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* column styles */
td.cv{
  text-align:center;
  font-family:var(--mono);
  font-size:12px;
  color:#9898b8;
}
td.cn{
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  cursor:pointer;
  user-select:none;
}
td.cn:hover{text-decoration:underline;text-decoration-color:rgba(255,255,255,.3)}
td.cb{
  font-family:var(--mono);
  font-size:12px;
  color:#aac8e0;
  white-space:nowrap;
}
td.co{
  font-family:var(--mono);
  font-size:12px;
  color:#aac8e0;
  text-align:right;
}
td.ca{
  font-size:11px;
  color:#8890b0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
td.ct{white-space:nowrap}

/* ── STATUS ROW COLORS ── */
tr.st-fc   { background:#2a2a40 }
tr.st-ex   { background:#2e2600 }
tr.st-hard { background:#300a06 }
tr.st-nc   { background:#061428 }
tr.st-ec   { background:#061a08 }
tr.st-fail { background:#04051a }

tr.st-fc   td.cn { color:#d4d4ea; font-weight:600 }
tr.st-ex   td.cn { color:#ffd700; font-weight:600 }
tr.st-hard td.cn { color:#ff6655; font-weight:600 }
tr.st-nc   td.cn { color:#5599ff; font-weight:600 }
tr.st-ec   td.cn { color:#44cc66; font-weight:600 }
tr.st-fail td.cn { color:#4466bb; font-weight:600 }

/* status dot prefix via data attr */
td.cn[data-st]::before{
  content:attr(data-dot);
  display:inline-block;
  width:8px;height:8px;
  border-radius:50%;
  margin-right:6px;
  vertical-align:middle;
  flex-shrink:0;
}
tr.st-fc   td.cn::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; background:#c0c0d8 }
tr.st-ex   td.cn::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; background:#ffd700 }
tr.st-hard td.cn::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; background:#ff5544 }
tr.st-nc   td.cn::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; background:#5599ff }
tr.st-ec   td.cn::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; background:#44cc66 }
tr.st-fail td.cn::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; background:#334488 }

/* ── DROPDOWN ── */
#sdrop{
  display:none;
  position:fixed;
  background:#14142a;
  border:1px solid #303060;
  border-radius:6px;
  box-shadow:0 6px 24px rgba(0,0,0,.7);
  z-index:900;
  overflow:hidden;
  min-width:150px;
}
#sdrop button{
  display:block;width:100%;
  padding:8px 14px;
  background:none;border:none;
  color:var(--txt);
  font-size:12px;font-family:inherit;
  text-align:left;cursor:pointer;
  border-bottom:1px solid #1e1e3a;
  transition:background .12s;
  display:flex;align-items:center;gap:8px;
}
#sdrop button:last-child{border-bottom:none}
#sdrop button:hover{background:#1e1e40}
#sdrop button .dot{
  display:inline-block;
  width:8px;height:8px;
  border-radius:50%;
  flex-shrink:0;
}
#sdrop .drop-title{
  padding:6px 14px 4px;
  font-size:10px;color:var(--dim);
  letter-spacing:.06em;
  border-bottom:1px solid #1e1e3a;
}

/* type badges */
.bdg{
  display:inline-block;
  padding:1px 5px;
  border-radius:2px;
  font-size:10px;font-weight:700;
  white-space:nowrap;
  border:1px solid transparent;
  letter-spacing:.02em;
}

/* mobile */
/* switch button */
.sw-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;
  border:1px solid #303060;border-radius:4px;
  color:#7aaaff;text-decoration:none;
  font-size:11px;letter-spacing:.04em;white-space:nowrap;
  flex-shrink:0;
  transition:background .15s,border-color .15s;
}
.sw-btn:hover{background:#1a1a38;border-color:#5050a0}

/* export / import buttons */
.io-btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:4px 8px;
  background:none;
  border:1px solid #303060;border-radius:4px;
  color:#9ab8d0;
  font-size:11px;letter-spacing:.04em;white-space:nowrap;
  cursor:pointer;flex-shrink:0;
  transition:background .15s,border-color .15s;
}
.io-btn:hover{background:#1a1a38;border-color:#5050a0;color:#7aaaff}

@media(max-width:580px){
  .ca{display:none}
  .tbl colgroup .cb{width:90px}
  .tbl colgroup .co{width:44px}
  #hd h1{font-size:13px}
  .sw-btn span,.io-btn span{display:none}
  .io-btn{padding:4px 7px}
}
</style>
</head>
<body>

<div id="hd">
  <h1><span class="star">☆12</span> ノーマル難易度表</h1>
  <a href="hard.html" class="sw-btn">ハード表<span> →</span></a>
  <button class="io-btn" id="exp-btn" title="記録をJSONファイルで書き出す">↓<span> 書出</span></button>
  <button class="io-btn" id="imp-btn" title="JSONファイルから記録を読み込む">↑<span> 読込</span></button>
  <input type="file" id="imp-file" accept=".json" style="display:none">
  <button id="hbg" aria-label="メニューを開く">
    <span></span><span></span><span></span>
  </button>
</div>

<div id="ov"></div>

<nav id="mn" aria-label="ティアナビゲーション">
  <div id="mn-top">
    <span>TIER LIST</span>
    <button id="mc" aria-label="メニューを閉じる">✕</button>
  </div>
  <div id="mn-list"></div>
</nav>

<div id="sdrop"></div>

<main id="main"></main>

<script>
/* ── badge colors ── */
const BC = {
  'PEAK':    ['#3a2800','#ffaa00','#5a4200'],
  'CHARGE':  ['#003a28','#00ffaa','#005a3a'],
  'NOTES':   ['#002a44','#00aaff','#003a64'],
  'SOF-LAN': ['#28003a','#cc88ff','#3a0050'],
  'CHORD':   ['#380038','#ff88ff','#500050'],
  'SCRATCH': ['#380000','#ff8888','#500000'],
};
function badge(t){
  const [bg,fg,bd]=BC[t]||['#222','#aaa','#333'];
  return `<span class="bdg" style="background:${bg};color:${fg};border-color:${bd}">${t}</span>`;
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── clear status definitions ── */
const STATS = [
  {key:'',     label:'未クリア',   dot:'#444466'},
  {key:'fc',   label:'FULLCOMBO', dot:'#c0c0d8'},
  {key:'ex',   label:'EX-CLEAR',  dot:'#ffd700'},
  {key:'hard', label:'HARD',      dot:'#ff5544'},
  {key:'nc',   label:'N-CLEAR',   dot:'#5599ff'},
  {key:'ec',   label:'E-CLEAR',   dot:'#44cc66'},
  {key:'fail', label:'FAILED',    dot:'#334488'},
];
const LS = 'iidx12_song_';
let activeKey = null;

/* ── localStorage helpers (song-name based, shared with hard table) ── */
function lsKey(name){ return LS + name; }
function saveStatus(name, st){ localStorage.setItem(lsKey(name), st); }
function loadStatus(name){ return localStorage.getItem(lsKey(name))||''; }

/* ── apply status to a row ── */
function applyStatus(row, st){
  STATS.forEach(s => row.classList.remove('st-'+s.key));
  if(st) row.classList.add('st-'+st);
}

/* ── build dropdown ── */
const sdrop = document.getElementById('sdrop');
sdrop.innerHTML = `<div class="drop-title">クリア状況</div>`
  + STATS.map(s =>
    `<button data-st="${s.key}">
      <span class="dot" style="background:${s.dot}"></span>${s.label}
    </button>`
  ).join('');

sdrop.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const st = btn.dataset.st;
    if(activeKey){
      const row = document.querySelector(`tr[data-key="${activeKey}"]`);
      if(row){ applyStatus(row, st); saveStatus(row.dataset.name, st); }
    }
    closeDrop();
  });
});

function openDrop(e, key){
  e.stopPropagation();
  activeKey = key;
  sdrop.style.display = 'block';
  const vw = window.innerWidth, vh = window.innerHeight;
  const dw = 160, dh = sdrop.offsetHeight || 210;
  let x = e.clientX + 4, y = e.clientY + 4;
  if(x + dw > vw - 8) x = vw - dw - 8;
  if(y + dh > vh - 8) y = vh - dh - 8;
  sdrop.style.left = x + 'px';
  sdrop.style.top  = y + 'px';
}
function closeDrop(){ sdrop.style.display='none'; activeKey=null; }
document.addEventListener('click', closeDrop);

/* ── build side menu ── */
const mnList = document.getElementById('mn-list');
mnList.innerHTML = TIERS.map(t =>
  `<a class="mn-a" href="#${t.id}" onclick="closeMn()">
    <span class="mn-grade" style="color:${t.color}">${t.name}</span>
    <span class="mn-n">${t.songs.length}曲</span>
  </a>`
).join('');

/* ── build main content ── */
const mainEl = document.getElementById('main');
mainEl.innerHTML = TIERS.map(t => {
  const rows = t.songs.map(([ver,name,bpm,notes,attr,type], i) => {
    const key = `${t.id}-${i}`;
    return `<tr data-key="${key}" data-name="${esc(name)}">
      <td class="cv">${ver}</td>
      <td class="cn" onclick="openDrop(event,'${key}')">${esc(name)}</td>
      <td class="cb">${esc(bpm)}</td>
      <td class="co">${notes.toLocaleString()}</td>
      <td class="ca">${esc(attr)}</td>
      <td class="ct">${badge(type)}</td>
    </tr>`;
  }).join('');

  return `<section class="ts" id="${t.id}">
    <div class="th" style="--tc:${t.color}">
      <h2>${t.name}</h2>
      <span class="th-n">${t.songs.length}曲</span>
    </div>
    <table class="tbl">
      <colgroup>
        <col class="cv"><col class="cn"><col class="cb">
        <col class="co"><col class="ca"><col class="ct">
      </colgroup>
      <thead>
        <tr>
          <th class="cv">ver</th>
          <th class="cn">曲名</th>
          <th class="cb">BPM(開幕)</th>
          <th class="co">notes</th>
          <th class="ca">属性</th>
          <th class="ct">タイプ</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </section>`;
}).join('');

/* ── restore saved statuses from localStorage ── */
TIERS.forEach(t => {
  t.songs.forEach(([,name], i) => {
    const st = loadStatus(name);
    if(st){
      const row = document.querySelector(`tr[data-key="${t.id}-${i}"]`);
      if(row) applyStatus(row, st);
    }
  });
});

/* ── hamburger / menu logic ── */
const hbg = document.getElementById('hbg');
const mn  = document.getElementById('mn');
const ov  = document.getElementById('ov');
const mc  = document.getElementById('mc');

function openMn(){
  mn.classList.add('open');
  hbg.classList.add('is-open');
  ov.classList.add('on');
  document.body.style.overflow='hidden';
}
function closeMn(){
  mn.classList.remove('open');
  hbg.classList.remove('is-open');
  ov.classList.remove('on');
  document.body.style.overflow='';
}
hbg.addEventListener('click', openMn);
ov.addEventListener('click',  closeMn);
mc.addEventListener('click',  closeMn);

/* ── export / import ── */
document.getElementById('exp-btn').addEventListener('click', () => {
  const data = {};
  for(let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if(k.startsWith('iidx12_song_')) data[k] = localStorage.getItem(k);
  }
  const count = Object.keys(data).length;
  if(count === 0){ alert('保存された記録がありません'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'iidx_records.json'; a.click();
  URL.revokeObjectURL(url);
});

const impFile = document.getElementById('imp-file');
document.getElementById('imp-btn').addEventListener('click', () => impFile.click());
impFile.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      for(const [k, v] of Object.entries(data)){
        if(k.startsWith('iidx12_song_')){ localStorage.setItem(k, v); count++; }
      }
      alert(`${count}件の記録を読み込みました。ページを再読み込みします。`);
      location.reload();
    } catch(err){ alert('ファイルの読み込みに失敗しました。'); }
  };
  reader.readAsText(file);
  impFile.value = '';
});
</script>
