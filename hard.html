<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☆12 ハード難易度表</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080e;--s1:#0e0e1c;--s2:#121224;--bdr:#20203a;
  --txt:#d2d2ea;--dim:#8890b0;--hh:50px;--mw:264px;
  --mono:'Courier New',Consolas,monospace;
}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;font-size:13px;line-height:1.4;min-height:100vh}

/* HEADER */
#hd{position:fixed;top:0;left:0;right:0;height:var(--hh);background:#0a0a16;border-bottom:1px solid #222242;display:flex;align-items:center;padding:0 14px;z-index:200}
#hd h1{flex:1;font-size:15px;font-weight:700;color:#7aaaff;letter-spacing:.06em}
#hd h1 .star{color:#ffd700;margin-right:2px}

/* HAMBURGER */
#hbg{width:36px;height:36px;background:none;border:1px solid #282850;border-radius:3px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;padding:7px;flex-shrink:0;transition:border-color .2s}
#hbg:hover{border-color:#4040a0}
#hbg span{display:block;width:18px;height:2px;background:#7aaaff;border-radius:1px;transition:transform .22s,opacity .22s}
#hbg.is-open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
#hbg.is-open span:nth-child(2){opacity:0}
#hbg.is-open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* OVERLAY */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300}
#ov.on{display:block}

/* SIDE MENU */
#mn{position:fixed;top:0;right:calc(-1 * var(--mw));width:var(--mw);height:100vh;background:#0c0c1c;border-left:1px solid #222242;z-index:400;transition:right .26s ease;display:flex;flex-direction:column}
#mn.open{right:0}
#mn-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #1a1a32;flex-shrink:0}
#mn-top span{font-size:11px;color:var(--dim);letter-spacing:.08em}
#mc{background:none;border:none;color:#7aaaff;font-size:18px;cursor:pointer;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
#mn-list{overflow-y:auto;flex:1;padding-bottom:24px}
.mn-a{display:flex;align-items:center;gap:8px;padding:9px 16px;color:var(--dim);text-decoration:none;border-bottom:1px solid #14142a;font-size:12px;transition:background .14s,color .14s}
.mn-a:hover{background:#141430;color:var(--txt)}
.mn-grade{font-weight:700;min-width:68px}
.mn-n{font-size:11px;color:var(--dim)}

/* MAIN */
#main{padding-top:calc(var(--hh) + 10px);padding-bottom:60px}

/* TIER */
.ts{margin-bottom:24px}
.th{position:sticky;top:var(--hh);background:#0d0d1c;border-left:4px solid var(--tc,#666);padding:6px 14px;display:flex;align-items:center;gap:10px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer;user-select:none}
.th h2{font-size:13px;font-weight:700;color:var(--tc,#888);letter-spacing:.04em}
.th-n{font-size:11px;color:var(--dim)}
.th-tog{margin-left:auto;font-size:10px;color:var(--dim);transition:transform .2s;flex-shrink:0}
.ts.collapsed .th-tog{transform:rotate(-90deg)}
.ts.collapsed .tbl{display:none}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;table-layout:fixed}
.tbl colgroup .cv{width:34px}
.tbl colgroup .cn{width:auto}
.tbl colgroup .cb{width:118px}
.tbl colgroup .co{width:52px}
.tbl colgroup .ct{width:78px}

.tbl thead th{background:var(--s1);color:var(--dim);font-weight:400;font-size:11px;padding:5px 6px;border-bottom:1px solid var(--bdr);white-space:nowrap;overflow:hidden}
.tbl thead th.cv{text-align:center}
.tbl thead th.co{text-align:right}
.tbl thead th.sortable{cursor:pointer;user-select:none}
.tbl thead th.sortable:hover{color:var(--txt);background:#141428}
.tbl thead th.sort-asc::after {content:' ▲';font-size:9px;color:#7aaaff}
.tbl thead th.sort-desc::after{content:' ▼';font-size:9px;color:#7aaaff}
.tbl tbody tr{border-bottom:1px solid #101020}
.tbl tbody tr:not([class*="st-"]):nth-child(even){background:rgba(255,255,255,.012)}
.tbl tbody tr:not([class*="st-"]):hover{background:#141432}
.tbl tbody tr[class*="st-"]:hover{filter:brightness(1.15)}
.tbl td{padding:5px 6px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

td.cv{text-align:center;font-family:var(--mono);font-size:12px;color:#9898b8}
td.cn{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;user-select:none}
td.cn:hover{text-decoration:underline;text-decoration-color:rgba(255,255,255,.3)}
td.cb{font-family:var(--mono);font-size:12px;color:#aac8e0;white-space:nowrap}
td.co{font-family:var(--mono);font-size:12px;color:#aac8e0;text-align:right}
td.ct{white-space:nowrap}

/* STATUS */
tr.st-fc   {background:#2a2a40}
tr.st-ex   {background:#2e2600}
tr.st-hard {background:#300a06}
tr.st-nc   {background:#061428}
tr.st-ec   {background:#061a08}
tr.st-fail {background:#04051a}
tr.st-fc   td.cn{color:#d4d4ea;font-weight:600}
tr.st-ex   td.cn{color:#ffd700;font-weight:600}
tr.st-hard td.cn{color:#ff6655;font-weight:600}
tr.st-nc   td.cn{color:#5599ff;font-weight:600}
tr.st-ec   td.cn{color:#44cc66;font-weight:600}
tr.st-fail td.cn{color:#4466bb;font-weight:600}
tr.st-fc   td.cn::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;background:#c0c0d8}
tr.st-ex   td.cn::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;background:#ffd700}
tr.st-hard td.cn::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;background:#ff5544}
tr.st-nc   td.cn::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;background:#5599ff}
tr.st-ec   td.cn::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;background:#44cc66}
tr.st-fail td.cn::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;background:#334488}

/* DROPDOWN */
#sdrop{display:none;position:fixed;background:#14142a;border:1px solid #303060;border-radius:6px;box-shadow:0 6px 24px rgba(0,0,0,.7);z-index:900;overflow:hidden;min-width:150px}
#sdrop button{display:flex;width:100%;padding:8px 14px;background:none;border:none;color:var(--txt);font-size:12px;font-family:inherit;text-align:left;cursor:pointer;border-bottom:1px solid #1e1e3a;transition:background .12s;align-items:center;gap:8px}
#sdrop button:last-child{border-bottom:none}
#sdrop button:hover{background:#1e1e40}
#sdrop button .dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
#sdrop .drop-title{padding:6px 14px 4px;font-size:10px;color:var(--dim);letter-spacing:.06em;border-bottom:1px solid #1e1e3a}

/* badge */
.bdg{display:inline-block;padding:1px 5px;border-radius:2px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid transparent;letter-spacing:.02em}

/* switch button */
.sw-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;
  border:1px solid #303060;border-radius:4px;
  color:#7aaaff;text-decoration:none;
  font-size:11px;letter-spacing:.04em;white-space:nowrap;
  flex-shrink:0;
  transition:background .15s,border-color .15s;
}
.sw-btn:hover{background:#1a1a38;border-color:#5050a0}

/* export / import buttons */
.io-btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:4px 8px;
  background:none;
  border:1px solid #303060;border-radius:4px;
  color:#9ab8d0;
  font-size:11px;letter-spacing:.04em;white-space:nowrap;
  cursor:pointer;flex-shrink:0;
  transition:background .15s,border-color .15s;
}
.io-btn:hover{background:#1a1a38;border-color:#5050a0;color:#7aaaff}

@media(max-width:580px){
  .tbl colgroup .cb{width:90px}
  .tbl colgroup .co{width:44px}
  #hd h1{font-size:13px}
  .sw-btn span,.io-btn span{display:none}
  .io-btn{padding:4px 7px}
}
</style>

  });

function openDrop(e,key){
  e.stopPropagation();activeKey=key;sdrop.style.display='block';

/* sort by ver (initial) */
TIERS.forEach(t=>t.songs.sort((a,b)=>a[0]-b[0]));

/* sort system */
let sortState={col:'ver',dir:1};

function parseBpm(s){const m=String(s).match(/\((\d+)\)/);return m?parseInt(m[1]):(parseInt(String(s))||0)}

function sortedSongs(songs){
  const{col,dir}=sortState;
  return[...songs].sort((a,b)=>{
    let av,bv;
    if(col==='ver')  {av=a[0];bv=b[0]}
    else if(col==='name') {av=a[1];bv=b[1]}
    else if(col==='bpm')  {av=parseBpm(a[2]);bv=parseBpm(b[2])}
    else if(col==='notes'){av=a[3];bv=b[3]}
    else if(col==='type') {av=a[a.length-1];bv=b[b.length-1]}
    if(av<bv)return -dir;if(av>bv)return dir;return 0;
  });
}

function makeRows(t){
  return sortedSongs(t.songs).map(song=>{
    const origIdx=t.songs.indexOf(song);
    const[ver,name,bpm,notes]=song;
    const type=song[song.length-1];
    const key=`${t.id}-${origIdx}`;
    return`<tr data-key="${key}" data-name="${esc(name)}"><td class="cv">${ver}</td><td class="cn" onclick="openDrop(event,'${key}')">${esc(name)}</td><td class="cb">${esc(bpm)}</td><td class="co">${notes.toLocaleString()}</td><td class="ct">${badge(type)}</td></tr>`;
  }).join('');
}

function restoreStatus(t){
  t.songs.forEach(([,name],i)=>{
    const st=loadStatus(name);
    if(st){const row=document.querySelector(`tr[data-key="${t.id}-${i}"]`);if(row)applyStatus(row,st)}
  });
}

function updateSort(col){
  if(sortState.col===col)sortState.dir*=-1;
  else{sortState.col=col;sortState.dir=1}
  document.querySelectorAll('.tbl thead th[data-col]').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.col===col)th.classList.add(sortState.dir===1?'sort-asc':'sort-desc');
  });
  TIERS.forEach(t=>{
    const tbody=document.querySelector(`#${t.id} .tbl tbody`);
    if(tbody){tbody.innerHTML=makeRows(t);restoreStatus(t)}
  });
}

/* tier collapse */
function toggleTier(id){
  const sec=document.getElementById(id);
  const collapsed=sec.classList.toggle('collapsed');
  localStorage.setItem('iidx12_col_'+id,collapsed?'1':'');
}
TIERS.forEach(t=>{
  if(localStorage.getItem('iidx12_col_'+t.id))
    document.getElementById(t.id)?.classList.add('collapsed');
});

/* hamburger */
const hbg=document.getElementById('hbg'),mn=document.getElementById('mn'),ov=document.getElementById('ov'),mc=document.getElementById('mc');
function openMn(){mn.classList.add('open');hbg.classList.add('is-open');ov.classList.add('on');document.body.style.overflow='hidden'}
function closeMn(){mn.classList.remove('open');hbg.classList.remove('is-open');ov.classList.remove('on');document.body.style.overflow=''}
hbg.addEventListener('click',openMn);ov.addEventListener('click',closeMn);mc.addEventListener('click',closeMn);

/* export / import */
document.getElementById('exp-btn').addEventListener('click',()=>{
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('iidx12_song_'))data[k]=localStorage.getItem(k);
  }
  const count=Object.keys(data).length;
  if(count===0){alert('保存された記録がありません');return}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='iidx_records.json';a.click();
  URL.revokeObjectURL(url);
});

const impFile=document.getElementById('imp-file');
document.getElementById('imp-btn').addEventListener('click',()=>impFile.click());
impFile.addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      let count=0;
      for(const[k,v]of Object.entries(data)){
        if(k.startsWith('iidx12_song_')){localStorage.setItem(k,v);count++}
      }
      alert(`${count}件の記録を読み込みました。ページを再読み込みします。`);
      location.reload();
    }catch(err){alert('ファイルの読み込みに失敗しました。')}
  };
  reader.readAsText(file);
  impFile.value='';
});
